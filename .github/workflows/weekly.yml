name: Starlink Weekly Automation
run-name: Starlink Weekly Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * 1"

concurrency:
  group: weekly-starlink-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate environment
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GITEE_REMOTE: ${{ secrets.GITEE_REMOTE }}
        run: python scripts/validate_env.py

      - name: Run weekly automation
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/run_weekly.py --max-source-items 10 --max-history-records 20

      - name: Commit generated weekly files
        run: |
          git config user.name "starlink-intel-bot"
          git config user.email "starlink-intel-bot@example.com"
          git add README.md .gitignore .github scripts docs weekly data/items.jsonl data/source_status.json data/extraction_quality.json outputs/logs/.gitkeep sources.yml requirements.txt .env.example
          if git diff --cached --quiet; then
            echo "阶段 2D 自动化输出没有变化，跳过提交。"
          else
            git commit -m "chore: update weekly Starlink automation output"
            git push origin main
          fi

      - name: Sync to Gitee
        env:
          GITEE_REMOTE: ${{ secrets.GITEE_REMOTE }}
        run: |
          if [ -z "$GITEE_REMOTE" ]; then
            echo "GITEE_REMOTE 未配置，跳过 Gitee 同步。"
            echo "GITEE_SYNC_STATUS=skipped" >> "$GITHUB_ENV"
            exit 0
          fi

          git remote remove gitee 2>/dev/null || true
          if ! git remote add gitee "$GITEE_REMOTE" 2>/dev/null; then
            echo "::warning::Gitee remote 添加失败，已跳过，不阻断 GitHub 周报主流程。请检查 GITEE_REMOTE。"
            echo "GITEE_SYNC_STATUS=failed" >> "$GITHUB_ENV"
            exit 0
          fi

          success=0
          push_log="$(mktemp)"
          for attempt in 1 2 3; do
            echo "尝试同步到 Gitee，第 ${attempt}/3 次..."
            if git push gitee main >"$push_log" 2>&1; then
              echo "Gitee 同步成功。"
              echo "GITEE_SYNC_STATUS=success" >> "$GITHUB_ENV"
              success=1
              break
            else
              echo "::warning::Gitee 同步第 ${attempt} 次失败，可能是 Gitee 认证服务超时、网络波动或令牌权限问题。"
              sleep $((attempt * 10))
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "::warning::Gitee 同步失败，已跳过，不阻断 GitHub 周报主流程。请稍后手动重新运行 workflow 或检查 GITEE_REMOTE。"
            echo "GITEE_SYNC_STATUS=failed" >> "$GITHUB_ENV"
          fi
          rm -f "$push_log"

          exit 0

      - name: Write run summary
        if: always()
        env:
          GITEE_REMOTE: ${{ secrets.GITEE_REMOTE }}
          ACTION_RUN_STATUS: ${{ job.status }}
        run: |
          python scripts/print_action_summary.py >> "$GITHUB_STEP_SUMMARY"
