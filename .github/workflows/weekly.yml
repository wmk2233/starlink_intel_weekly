name: Starlink Weekly Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * 1"

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run weekly automation
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/run_weekly.py

      - name: Commit generated weekly files
        run: |
          git config user.name "starlink-intel-bot"
          git config user.email "starlink-intel-bot@example.com"
          git add docs weekly
          if git diff --cached --quiet; then
            echo "docs/ 和 weekly/ 没有变化，跳过提交。"
          else
            git commit -m "chore: update weekly Starlink automation output"
            git push origin main
          fi

      - name: Sync to Gitee
        env:
          GITEE_REMOTE: ${{ secrets.GITEE_REMOTE }}
        run: |
          if [ -z "$GITEE_REMOTE" ]; then
            echo "GITEE_REMOTE 未配置，跳过 Gitee 同步。"
          else
            git remote remove gitee 2>/dev/null || true
            git remote add gitee "$GITEE_REMOTE"
            git push gitee main
          fi
